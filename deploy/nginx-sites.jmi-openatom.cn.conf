# 宝塔站点配置：
# /www/server/panel/vhost/nginx/sites.jmi-openatom.cn.conf
#
# 说明：
# 1. 平台域名 sites.jmi-openatom.cn 和 *.sites.jmi-openatom.cn 使用现有通配证书。
# 2. CNAME 自定义域名通过 HTTP 正则兜底进入后端，后端依据原始 Host 匹配站点。
# 3. 自定义域名不能复用 *.sites.jmi-openatom.cn 证书；启用 HTTPS 前必须单独签发证书，
#    或改用项目自带的 Caddy 按需 HTTPS 模式。

# 平台域名：HTTP 跳转 HTTPS。
server {
    listen 80;
    server_name sites.jmi-openatom.cn *.sites.jmi-openatom.cn;

    root /www/wwwroot/sites.jmi-openatom.cn;

    # SSL 证书申请验证配置，请勿删除。
    include /www/server/panel/vhost/nginx/well-known/sites.jmi-openatom.cn.conf;

    location / {
        return 301 https://$host$request_uri;
    }

    access_log /www/wwwlogs/sites.jmi-openatom.cn.log;
    error_log /www/wwwlogs/sites.jmi-openatom.cn.error.log;
}

# 平台域名：HTTPS 发布入口。
server {
    listen 443 ssl;
    http2 on;
    server_name sites.jmi-openatom.cn *.sites.jmi-openatom.cn;

    root /www/wwwroot/sites.jmi-openatom.cn;
    index index.html index.htm;

    include /www/server/panel/vhost/nginx/extension/sites.jmi-openatom.cn/*.conf;

    ssl_certificate /www/server/panel/vhost/cert/sites.jmi-openatom.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/sites.jmi-openatom.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:EECDH+AES256;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;

    # 禁止访问敏感文件。
    location ~* (^|/)\.(?:git|svn|env)(?:/|$) {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Real-Port $remote_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering on;
        client_max_body_size 100m;
    }

    access_log /www/wwwlogs/sites.jmi-openatom.cn.log;
    error_log /www/wwwlogs/sites.jmi-openatom.cn.error.log;
}

# 用户 CNAME 自定义域名：HTTP 兜底入口。
#
# 精确域名和通配域名 server_name 的优先级高于正则，因此服务器上已有的其他网站
# 不会被这个配置抢走；没有单独配置的域名才会进入这里，并由后端判断是否已绑定。
server {
    listen 80;
    server_name ~^.+$;

    root /www/wwwroot/sites.jmi-openatom.cn;

    # 为后续手动签发自定义域名证书保留 ACME 文件验证路径。
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Real-Port $remote_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering on;
        client_max_body_size 100m;
    }

    access_log /www/wwwlogs/site-custom-domains.log;
    error_log /www/wwwlogs/site-custom-domains.error.log;
}

